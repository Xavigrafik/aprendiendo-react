<!doctype html>
<html lang="es"> <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./src/assets/icons/favicon.svg" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    
    <title>Waveless | Vive tus propias aventuras</title>
</head>

<body>
    
    <div class="container-fluid">
        
        <o-navbar id="main-nav"></o-navbar>
        
        <section class="hero" id="main-hero">
            <header class="hero__header">
                <h2 class="hero__title">Ruta por Australia</h2>
                <p class="hero__subtitle">Si te va la aventura, no te lo puedes perder</p>
                <a-button ondark variant="primary" size="lg">Más información</a-button>
            </header>

            <div class="hero__arrows" aria-label="Navegación del slider">
                <button class="hero__arrow hero__arrow--prev" aria-label="Anterior">
                    <a-icon name="chevron-left" size="sm"></a-icon>
                </button>
                <button class="hero__arrow hero__arrow--next" aria-label="Siguiente">
                    <a-icon name="chevron-right" size="sm"></a-icon>
                </button>
            </div>

            <div class="hero__dots" role="tablist">
                <button class="hero__dot hero__dot--active" role="tab" aria-selected="true" aria-label="Slide 1"></button>
                <button class="hero__dot" role="tab" aria-selected="false" aria-label="Slide 2"></button>
                <button class="hero__dot" role="tab" aria-selected="false" aria-label="Slide 3"></button>
            </div>
        </section>

        <main class="container">

            <section class="title-block">
                <h3 class="title-block__heading">Vive tus propias aventuras</h3>
                <p class="title-block__subtitle">Para los que les gusta explorar y conocer mundo sin complejos</p>
            </section>
            
            <div class="main-block">
                
                <o-aside id="filters"></o-aside>
                
                <div class="content-area"> 
                    <button id="filter-toggle-button">
                        <a-icon name="filter"></a-icon> 
                        <span>Ver filtros</span>
                    </button>
                    <o-card-list></o-card-list>
                </div>
            </div>
            
        </main>
        
        <o-modal></o-modal>
        <o-footer></o-footer>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
